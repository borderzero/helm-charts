{{/* Only create the secret if it doesn't already exist. This ensures Helm tracks
     it for lifecycle management (e.g. helm uninstall), while preserving any
     credentials tailzero has already written into it on subsequent upgrades. */}}
{{- if not (lookup "v1" "Secret" .Release.Namespace (include "tailzero-connector.generatedSecretName" .)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tailzero-connector.generatedSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tailzero-connector.labels" . | nindent 4 }}
type: Opaque
{{- end }}
